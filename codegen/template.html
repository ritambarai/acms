<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>ACMS Master Portal</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

.half {
  flex: 1;
  padding: 12px;
  border-bottom: 2px solid #ccc;
  display: flex;
  flex-direction: column;
}

/* ===== FORM LAYOUT ===== */
.form-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  align-items: flex-end;
  justify-content: space-evenly;
}

.field {
  flex: 0 0 var(--field-width);   /* fixed width */
  min-width: 0;
}

.field label {
  display: block;
  text-align: center;
}

.field input {
  width: 100%;
  padding: 6px;
  box-sizing: border-box;
}

.field input.invalid {
  border: 2px solid red;
}

.error-msg {
  display: block;
  color: red;
  font-size: 11px;
  text-align: center;
  min-height: 14px;
}

.main-header {
  position: relative;
  text-align: center;
  margin: 15px 0;
}

.main-header h1 {
  margin: 0;
  display: inline;
}

#submit-area {
  position: absolute;
  right: 16px;
  top: 50%;
  transform: translateY(-50%);
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 4px;
}

.check-label {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 12px;
  cursor: pointer;
  white-space: nowrap;
}

.category-header {
  text-align: center;
  margin-bottom: 10px;
  position: relative;
}

.toggle-btn {
  position: absolute;
  right: 0;
  top: 50%;
  transform: translateY(-50%);
  padding: 2px 8px;
  font-size: 12px;
  cursor: pointer;
}

.half.collapsed {
  flex: 0 0 auto;
}

/* ===== SUBCATEGORY ROWS ===== */
.subcat-row {
  display: flex;
  align-items: flex-end;
  gap: 10px;
  margin-bottom: 6px;
}

.subcat-label {
  writing-mode: vertical-rl;
  text-orientation: mixed;
  transform: rotate(180deg);
  font-size: 11px;
  font-weight: bold;
  text-transform: uppercase;
  color: #666;
  white-space: nowrap;
  padding: 2px 0;
}

.subcat-row .form-grid {
  flex: 1;
}


/* ===== TABLE ===== */
.table-wrap {
  flex: 1;
  overflow-y: auto;
  margin-top: 10px;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th, td {
  border: 1px solid #ccc;
  padding: 6px;
  text-align: center;
}

th {
  background: #eee;
}

.delete {
  color: red;
  cursor: pointer;
  font-weight: bold;
}

/* ===== BUTTON ===== */
button {
  padding: 6px 16px;
  font-weight: bold;
  cursor: pointer;
}

.insert-btn {
  display: block;
  margin: 8px auto;
  padding: 3px 10px;
  font-size: 12px;
}

/* ===== SETTINGS BAR ===== */
.settings-bar {
  padding: 4px 12px 6px;
  border-bottom: 2px solid #ccc;
}

.settings-category {
  margin: 2px 0 4px;
}

.settings-compact .subcat-label {
  font-size: 10px;
}

.settings-form-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: flex-end;
}

.settings-field {
  min-width: 110px;
}

.settings-field label {
  display: block;
  font-size: 11px;
  text-align: center;
}

.settings-field input {
  width: 100%;
  padding: 2px 5px;
  font-size: 11px;
  box-sizing: border-box;
}
</style>
</head>

<body>
<div class="main-header">
  <h1>ACMS Master Portal</h1>
  <div id="submit-area">
    <button id="submit-btn" onclick="submitAll()">Submit</button>
    %HEADERS_BLOCK%
  </div>
</div>

</html>
